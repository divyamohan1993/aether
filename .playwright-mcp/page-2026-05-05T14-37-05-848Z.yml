        - heading "A 40 KB cry for help. A two second answer." [level=2] [ref=e81]:
          - text: A 40 KB cry for help.
          - emphasis [ref=e82]: A two second answer.
        - paragraph [ref=e83]: A 40 KB SOS payload. Zero Speech-to-Text. Gemini 2.5 Flash hears the panic. SDRF receives a structured dispatch brief in under two seconds.
        - generic [ref=e84]:
          - generic [ref=e85]:
            - generic [ref=e86]: 40KB
            - generic [ref=e87]: Fifteen seconds of voice · Opus 12 kbps · slips through one 2G burst
          - generic [ref=e88]:
            - generic [ref=e89]: < 2sec
            - generic [ref=e90]: End-to-end · capture to dispatch JSON on SDRF screen
          - generic [ref=e91]:
            - generic [ref=e92]: $0idle
            - generic [ref=e93]: Cloud Run scales to zero between events · pay per token only when invoked
        - paragraph [ref=e94]: Nothing streams. Nothing waits open. Nothing transcribes in the middle. The brittle four-stage pipeline (denoise, STT, translate, LLM) collapses to one resilient call.
    - region "Four moves. One rescue brief." [ref=e95]:
      - generic [ref=e96]:
        - generic [ref=e97]: Slide 4 · Underlying Magic
        - heading "Four moves. One rescue brief." [level=2] [ref=e98]:
          - text: Four moves.
          - emphasis [ref=e99]: One rescue brief.
        - paragraph [ref=e100]: Capture is local. Queue is offline. Burst is opportunistic. Triage is server-side. The phone never holds a Vertex AI key.
        - list "Pipeline steps" [ref=e101]:
          - listitem [ref=e102]:
            - paragraph [ref=e103]: 01 · Capture
            - heading "Press to record. Black screen." [level=3] [ref=e104]
            - paragraph [ref=e105]: MediaRecorder · Opus · 12 kbps
            - paragraph [ref=e106]: Pure black OLED UI. Pixels off. Volume key starts the recording so the screen never lights up.
          - listitem [ref=e107]:
            - paragraph [ref=e108]: 02 · Queue
            - heading "Save first. Connect later." [level=3] [ref=e109]
            - paragraph [ref=e110]: IndexedDB · ServiceWorker
            - paragraph [ref=e111]: Clip lands in encrypted local storage before any radio wakes up. The payload outlives the connection.
          - listitem [ref=e112]:
            - paragraph [ref=e113]: 03 · 2G Burst
            - heading "One handshake. One POST." [level=3] [ref=e114]
            - paragraph [ref=e115]: HTTP · auto-retry · backoff
            - paragraph [ref=e116]: OS reports a single bar. Aether fires the 40 KB POST, closes the socket, and returns to sleep.
          - listitem [ref=e117]:
            - paragraph [ref=e118]: 04 · Triage
            - heading "Gemini hears the room." [level=3] [ref=e119]
            - paragraph [ref=e120]: Vertex · 2.5 Flash · thinkingBudget 0
            - paragraph [ref=e121]: Strict responseSchema returns a typed dispatch JSON. SDRF webhook fires within one second.
        - paragraph [ref=e122]: मदद आ रही है
