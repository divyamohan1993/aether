      - region "06 Security model" [ref=e446]:
        - heading "06 Security model" [level=2] [ref=e447]:
          - generic [ref=e448]: "06"
          - text: Security model
        - heading "Why post-quantum, why now" [level=3] [ref=e449]
        - paragraph [ref=e450]: ML-DSA-65 is the digital signature scheme standardised by NIST as FIPS 204. It is built on lattice problems that resist both classical and quantum attacks. A 2030-era adversary recording today's session traffic gains nothing from breaking it later, because no recovery secret ever leaves the user's device.
        - paragraph [ref=e451]: Each TM user has their own keypair, generated in the browser at registration. The server never sees the private key. Login is challenge-response. Privileged actions carry a per-action signature whose canonical message names the action and target, so it cannot be replayed against a different record.
        - heading "Private key custody" [level=3] [ref=e452]
        - list [ref=e453]:
          - listitem [ref=e454]:
            - text: Generated in the browser via
            - code [ref=e455]: "@noble/post-quantum"
            - text: .
          - listitem [ref=e456]:
            - text: Encrypted at rest in IndexedDB using AES-256-GCM. Key derivation is Argon2id with
            - code [ref=e457]: t=3
            - text: ","
            - code [ref=e458]: m=64 MiB
            - text: ","
            - code [ref=e459]: p=1
            - text: ","
            - code [ref=e460]: dkLen=32
            - text: .
          - listitem [ref=e461]: The passphrase is the only thing held in human memory. The server cannot brute-force it because it never sees the encrypted blob.
        - heading "Server keypair custody" [level=3] [ref=e462]
        - list [ref=e463]:
          - listitem [ref=e464]: The server's ML-DSA-65 keypair lives in Google Secret Manager.
          - listitem [ref=e465]: Cloud Run mounts the secret via a least-privilege binding to the runtime service account.
          - listitem [ref=e466]: Rotation is a swap of the secret version plus a redeploy. Old session tokens are invalidated within their thirty-minute TTL.
        - heading "Transport and headers" [level=3] [ref=e467]
        - list [ref=e468]:
          - listitem [ref=e469]:
            - text: "HSTS preload:"
            - code [ref=e470]: max-age=63072000; includeSubDomains; preload
            - text: .
          - listitem [ref=e471]:
            - text: "Strict CSP:"
            - code [ref=e472]: default-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'
            - text: . No third-party scripts, no inline frames.
          - listitem [ref=e473]: "Permissions-Policy: locked to first-party microphone and geolocation only. Camera, USB, payment, MIDI, and friends are off."
          - listitem [ref=e474]:
            - code [ref=e475]: "X-Content-Type-Options: nosniff"
            - text: ","
            - code [ref=e476]: "Referrer-Policy: no-referrer"
            - text: ","
            - code [ref=e477]: "Cross-Origin-Opener-Policy: same-origin"
            - text: ","
            - code [ref=e478]: "Cross-Origin-Resource-Policy: same-origin"
            - text: .
        - heading "Rate limits" [level=3] [ref=e479]
        - list [ref=e480]:
          - listitem [ref=e481]: "Triage: 10 requests per minute, 200 per day, per IP. Token-bucket, in-memory, resets on cold start."
          - listitem [ref=e482]: "TM auth: 30 requests per minute, 200 per day, per IP. Same shape."
          - listitem [ref=e483]:
            - text: Both return
            - code [ref=e484]: 429 rate_limited
            - text: with a
            - code [ref=e485]: Retry-After
            - text: header.
        - heading "Compliance" [level=3] [ref=e486]
        - list [ref=e487]:
          - listitem [ref=e488]: "DPDP Act 2023 alignment: explicit consent for microphone use, granular and revocable from the device's site settings, audio retained only for processing, no PII in logs."
          - listitem [ref=e489]:
            - text: "GDPR alignment: data subject access via"
            - code [ref=e490]: GET /api/v1/tm/me
            - text: ", deletion via the parent in the hierarchy, data minimisation by design."
          - listitem [ref=e491]:
            - text: "India region pinning: Firestore database is Indian-region ("
            - code [ref=e492]: asia-south2
            - text: ); Cloud Run can be re-deployed to
            - code [ref=e493]: asia-south1
            - text: for production.
        - link "Skip to next section" [ref=e494] [cursor=pointer]:
          - /url: "#ops"
      - region "07 Operations" [ref=e495]:
        - heading "07 Operations" [level=2] [ref=e496]:
          - generic [ref=e497]: "07"
          - text: Operations
        - heading "Cost shape" [level=3] [ref=e498]
        - paragraph [ref=e499]: $0 idle by design. The whole stack scales to zero when no one is using it.
        - list [ref=e500]:
          - listitem [ref=e501]:
            - text: "Cloud Run:"
            - code [ref=e502]: min-instances=0
            - text: . Charged only for in-flight request seconds.
          - listitem [ref=e503]: "Vertex AI: pay-per-token; idle cost is zero."
          - listitem [ref=e504]: "Firestore Native: free tier covers 1 GB stored, 50K reads, 20K writes per day, more than enough for an MVP."
          - listitem [ref=e505]: "Secret Manager: two secret versions, well inside the six-version free tier."
          - listitem [ref=e506]: "Artifact Registry: image well under the 0.5 GB free tier."
          - listitem [ref=e507]: "Cloud Build: under the 120 build-minute daily free tier."
        - heading "Bootstrap procedure (NDMA root)" [level=3] [ref=e508]
        - list [ref=e509]:
          - listitem [ref=e510]:
            - text: Generate the operator's ML-DSA-65 keypair locally with the script in the repo. Save
            - code [ref=e511]: pub.b64
            - text: and
            - code [ref=e512]: priv.b64
            - text: .
          - listitem [ref=e513]:
            - text: "Set the gate flag:"
            - code [ref=e514]: gcloud run services update aether --update-env-vars=TM_BOOTSTRAP_ALLOW=1
            - text: .
          - listitem [ref=e515]:
            - text: POST
            - code [ref=e516]: "{ email, name, pubkey_b64 }"
            - text: to
            - code [ref=e517]: /api/v1/tm/auth/bootstrap
            - text: .
          - listitem [ref=e518]:
            - text: "Unset the flag:"
            - code [ref=e519]: "--update-env-vars=TM_BOOTSTRAP_ALLOW=0"
            - text: .
          - listitem [ref=e520]:
            - text: Keep
            - code [ref=e521]: priv.b64
            - text: offline. Lose it and the root account is unrecoverable by design.
        - heading "Adding the first user at each tier" [level=3] [ref=e522]
        - list [ref=e523]:
          - listitem [ref=e524]:
            - text: The NDMA root signs in and opens
            - link "/tm/#/users" [ref=e525] [cursor=pointer]:
              - /url: /tm/#/users
            - text: .
          - listitem [ref=e526]:
            - text: Invite a state officer with their email, tier 80, scope
            - code [ref=e527]: ndma/<state>
            - text: ", parent set to the NDMA root. Share the invite link."
          - listitem [ref=e528]:
            - text: The state officer signs up. Repeat the invite step for a district at tier 60, scope
            - code [ref=e529]: ndma/<state>/<district>
            - text: .
          - listitem [ref=e530]: Repeat down the chain to responder (40) and volunteer (20).
        - heading "Logs and observability" [level=3] [ref=e531]
        - list [ref=e532]:
          - listitem [ref=e533]: Every request emits structured JSON to Cloud Run stdout. Each line carries a timestamp, severity, function, request ID, IP, and the action-specific fields.
          - listitem [ref=e534]:
            - text: Cloud Logging is the search surface. Filter by
            - code [ref=e535]: jsonPayload.requestId
            - text: to follow a request across the triage and TM modules.
          - listitem [ref=e536]:
            - text: Audit log
            - code [ref=e537]: tm_audit
            - text: is append-only and stores the canonical signed message for every privileged action.
          - listitem [ref=e538]:
            - code [ref=e539]: X-Request-Id
            - text: is echoed on every HTTP response.
        - heading "Backup and restore" [level=3] [ref=e540]
        - list [ref=e541]:
          - listitem [ref=e542]:
            - text: Firestore export to a Cloud Storage bucket via
            - code [ref=e543]: gcloud firestore export
            - text: . Schedule daily.
          - listitem [ref=e544]: Secret Manager versions are immutable. A rotation creates a new version; old ones can be disabled but kept for forensic recovery.
          - listitem [ref=e545]: The Survivor PWA is a static bundle. Restore is a redeploy; no client state to recover.
