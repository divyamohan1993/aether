          - text: Hierarchy and scopes
        - paragraph [ref=e264]:
          - text: Every user, project, and task carries a
          - code [ref=e265]: scope_path
          - text: . Scope is a slash-separated lineage, and authority flows down the path. A user can act on any record whose scope starts with their own.
