        - heading "Worked examples" [level=3] [ref=e304]
        - list [ref=e305]:
          - listitem [ref=e306]:
            - text: An NDMA officer at
            - code [ref=e307]: ndma
            - text: can read every user, every project, every task. Their queries are unfiltered.
          - listitem [ref=e308]:
            - text: An SDMA officer at
            - code [ref=e309]: ndma/HP
            - text: can read users with scope
