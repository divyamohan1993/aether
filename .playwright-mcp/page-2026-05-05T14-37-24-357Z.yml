        - paragraph [ref=e53]: Edge AI for disaster response. A 40 KB SOS payload, no Speech-to-Text, Gemini 2.5 Flash hearing the panic, the dialect, and the river behind the door, returning a strict-schema dispatch brief in under two seconds.
