      - region "09 FAQ" [ref=e558]:
        - heading "09 FAQ" [level=2] [ref=e559]:
          - generic [ref=e560]: "09"
          - text: FAQ
        - generic [ref=e561]:
          - term [ref=e562]: Why no passwords?
          - definition [ref=e563]: Passwords have to be sent to a server, hashed, compared, and stored. Each step is a place to leak them. ML-DSA-65 challenge-response means the server never sees a secret. Compromising the database does not compromise the users.
          - term [ref=e564]: Can I lose my account if I forget my passphrase?
          - definition [ref=e565]: "Yes. The passphrase decrypts your private key in the browser. Without it the key is unrecoverable. Recovery is by re-invitation from your parent in the hierarchy. This is on purpose: it means an operator with database access still cannot impersonate you."
          - term [ref=e566]: How is this 2G-friendly?
          - definition [ref=e567]: The Survivor PWA is 12 KB raw, 4.5 KB brotli. The audio is Opus at 12 kbps, around 40 KB for a 15-second clip. A 1.5-second window of usable signal is enough to ship the whole payload.
          - term [ref=e568]: Why Gemini and not Whisper?
          - definition [ref=e569]: Whisper transcribes speech. In a panicked, multilingual, wind-and-static scenario it tends to drop or mangle words. Gemini's native audio modality reads tone, dialect mix, and ambient cues directly, then outputs JSON in one call. Fewer stages, fewer places to fail.
          - term [ref=e570]: Why post-quantum already?
          - definition [ref=e571]: Disaster-response audit trails outlive the device that signed them. A signature today must still be trustworthy in 2040. ML-DSA-65 is the NIST-standardised choice that meets that bar without exotic primitives.
          - term [ref=e572]: What if Cloud Run cold-starts during a disaster?
          - definition [ref=e573]:
            - text: Cold start for the Aether image is around 800 ms on a free-tier instance. The PWA's IndexedDB queue covers any failed POSTs and retries on reconnect. For a paid pilot, set
            - code [ref=e574]: min-instances=1
            - text: in the affected region for sub-100 ms p99 first response.
          - term [ref=e575]: How do I add a state-level user?
          - definition [ref=e576]:
            - text: NDMA root signs in, opens the users page, invites the state officer with tier 80 and scope
            - code [ref=e577]: ndma/<state>
            - text: . The state officer signs up using the invite link. See
            - link "Operations" [ref=e578] [cursor=pointer]:
              - /url: "#ops"
            - text: for the full chain.
          - term [ref=e579]: Where does my voice recording go?
          - definition [ref=e580]: From the browser, encrypted in transit by TLS 1.3, into the Cloud Run process memory, then into Vertex AI for Gemini to listen to. The Cloud Run container does not persist audio. After the response is sent, the buffer is freed. Triage JSON is logged with request ID, urgency, and confidence; not the audio, not the transcript.
          - term [ref=e581]: What runs offline?
          - definition [ref=e582]: The Survivor PWA shell, the queue, the language strings, the privacy notice. The triage call itself needs network, but the queue waits for it without losing the clip.
          - term [ref=e583]: Is it production-ready?
          - definition [ref=e584]:
            - text: "It is a 24-hour assessment build: end-to-end working, hardened headers, rate limits, scope checks, audit log. Production hardening for a state pilot would add a webhook signing key, Firestore backups, an in-region pin to"
            - code [ref=e585]: asia-south1
            - text: ", and a synthetic uptime probe."
        - link "Skip to next section" [ref=e586] [cursor=pointer]:
          - /url: "#changelog"
