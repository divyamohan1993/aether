        - heading "Two-click delegation, walked through" [level=3] [ref=e318]
        - list [ref=e319]:
          - listitem [ref=e320]:
            - text: You are SDMA Himachal at
            - code [ref=e321]: ndma/HP
            - text: . You open
            - link "the users page" [ref=e322] [cursor=pointer]:
              - /url: /tm/#/users
            - text: .
          - listitem [ref=e323]:
            - text: You click a row for a district officer at
            - code [ref=e324]: ndma/HP/Mandi
            - text: . Their current tier reads as 60.
          - listitem [ref=e325]: "You pick a new tier (say 40, demoting them to responder during a leave). The dialog reads: \"Set Mandi DDMO to tier 40 (responder)?\"."
          - listitem [ref=e326]:
            - text: You confirm. The browser asks for your passphrase, signs the canonical message
            - code [ref=e327]: delegate|<uid>|40
            - text: ", and posts it."
          - listitem [ref=e328]:
            - text: "The server checks: 40 is at or below your tier (true), the target sits in your subtree (true). It writes the change inside a Firestore transaction along with an entry in"
            - code [ref=e329]: tm_audit
