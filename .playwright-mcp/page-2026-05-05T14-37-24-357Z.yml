            - text: ","
            - code [ref=e312]: ndma/HP/Kullu/responder1
            - text: ", but not"
            - code [ref=e313]: ndma/UK
            - text: .
          - listitem [ref=e314]:
            - text: A responder at
            - code [ref=e315]: ndma/HP/Shimla/responder7
            - text: can update only the tasks where they are the assignee. They cannot read other responders' tasks even within Shimla.
          - listitem [ref=e316]:
            - text: A volunteer at
            - code [ref=e317]: ndma/HP/Shimla/responder7/volunteer3
