      - region "02 Survivor portal" [ref=e131]:
        - heading "02 Survivor portal" [level=2] [ref=e132]:
          - generic [ref=e133]: "02"
          - text: Survivor portal
        - paragraph [ref=e134]: A pure-black, hold-to-record SOS button. Built for a phone with one battery bar and one signal bar. The whole page is 12 KB raw, 4.5 KB brotli, served once and cached by the service worker.
        - heading "What happens when the button is pressed" [level=3] [ref=e135]
        - list [ref=e136]:
          - listitem [ref=e137]: The browser asks for microphone access. The mic icon is the only permission this page ever asks for.
          - listitem [ref=e138]:
            - code [ref=e139]: MediaRecorder
            - text: records Opus audio at 12 kbps mono, 16 kHz. Fifteen seconds of speech compresses to roughly 40 KB.
          - listitem [ref=e140]: If the device is offline, the clip goes into IndexedDB. A queue badge in the top bar shows how many clips are waiting.
          - listitem [ref=e141]: The next time the OS reports a network handshake, the queue flushes. Background Sync is registered when supported.
          - listitem [ref=e142]:
            - text: The clip is POSTed to
            - code [ref=e143]: /api/v1/triage
            - text: with optional headers for language, geo, battery, and effective network type.
          - listitem [ref=e144]:
            - text: The Cloud Run server forwards the audio to Vertex AI Gemini 2.5 Flash with a strict
            - code [ref=e145]: responseSchema
            - text: .
          - listitem [ref=e146]: Gemini hears the audio natively. No Speech-to-Text in the middle. It returns urgency, native and English transcription, casualties, needs, location clues, ambient cues, summary, confidence.
          - listitem [ref=e147]: "The PWA renders an urgency badge and a one-line dispatch summary. The survivor sees a calm message: help is on the way, stay where you are."
        - heading "Languages" [level=3] [ref=e148]
        - paragraph [ref=e149]:
          - text: Auto-detected from
          - code [ref=e150]: navigator.language
          - text: ". Native-script strings ship for:"
        - list [ref=e151]:
          - listitem [ref=e152]:
            - code [ref=e153]: en-IN
            - text: English (India)
          - listitem [ref=e154]:
            - code [ref=e155]: hi-IN
            - text: Hindi
          - listitem [ref=e156]:
            - code [ref=e157]: ta-IN
            - text: Tamil
          - listitem [ref=e158]:
            - code [ref=e159]: bn-IN
            - text: Bengali
        - paragraph [ref=e160]: Gemini detects the spoken language from the audio itself. The browser hint is a tie-breaker, never a hard constraint.
        - heading "Battery and network awareness" [level=3] [ref=e161]
        - list [ref=e162]:
          - listitem [ref=e163]:
            - text: Background is
            - code [ref=e164]: "#000000"
            - text: . On OLED screens, those pixels are physically off and draw zero current.
          - listitem [ref=e165]:
            - text: The top bar shows battery percentage (orange below 15%), the connection effective type from
            - code [ref=e166]: navigator.connection
            - text: ", queue depth, and language."
          - listitem [ref=e167]:
            - text: No polling. The page reacts to
            - code [ref=e168]: online
            - text: ","
            - code [ref=e169]: offline
            - text: ", and"
            - code [ref=e170]: connectionchange
            - text: events. The service worker uses background sync where the platform supports it, otherwise an exponential retry loop.
          - listitem [ref=e171]:
            - text: The record button works from the keyboard (
            - generic [ref=e172]: Space
            - text: or
            - generic [ref=e173]: Enter
            - text: ) and from media-session keys.
        - heading "Privacy" [level=3] [ref=e174]
        - list [ref=e175]:
          - listitem [ref=e176]:
            - text: "What is sent: the Opus clip, a UUIDv4 client ID stored in"
            - code [ref=e177]: localStorage
            - text: ", language hint, optional rough geolocation, optional battery and network type, an ISO 8601 timestamp."
          - listitem [ref=e178]: "What is stored locally: just the queue and the client ID. Nothing else."
          - listitem [ref=e179]: "Retention: server-side audio is processed in memory by Cloud Run, sent to Vertex AI, and discarded. No durable copy of the audio is kept by Aether. Triage JSON is logged with request ID, urgency, and confidence for operations."
          - listitem [ref=e180]: "SDRF webhook delivery shape: the same JSON document the API returns, signed with the service's HMAC and forwarded to the configured webhook URL. The webhook is opt-in per state."
        - link "Skip to next section" [ref=e181] [cursor=pointer]:
          - /url: "#tm"
      - region "03 Task Manager portal" [ref=e182]:
        - heading "03 Task Manager portal" [level=2] [ref=e183]:
          - generic [ref=e184]: "03"
          - text: Task Manager portal
        - paragraph [ref=e185]: A post-quantum-authenticated task tracker for the NDMA chain of command. Every privileged action carries an ML-DSA-65 signature. The server cannot impersonate a user, even with full database access.
        - paragraph [ref=e186]:
          - text: Mounted at
          - link /tm/ [ref=e187] [cursor=pointer]:
            - /url: /tm/
          - text: ". Single-page app, hash-routed, four sections: dashboard, projects, tasks, users."
        - heading "Login flow Skip" [level=3] [ref=e188]:
          - text: Login flow
          - link "Skip" [ref=e189] [cursor=pointer]:
            - /url: "#tm-register"
        - paragraph [ref=e190]: "Two fields: email and passphrase."
        - list [ref=e191]:
          - listitem [ref=e192]:
            - text: You type your email and click Continue. The browser POSTs
            - code [ref=e193]: "{ email }"
            - text: to
            - code [ref=e194]: /api/v1/tm/auth/challenge
            - text: . The server returns a 32-byte random challenge, even if the email is unknown (so an attacker cannot enumerate accounts).
          - listitem [ref=e195]: You type your passphrase. The browser pulls the encrypted private key from IndexedDB, derives a 32-byte key with Argon2id, and decrypts it with AES-256-GCM. The passphrase never leaves the device.
          - listitem [ref=e196]:
            - text: The browser signs the challenge with your ML-DSA-65 private key and POSTs
            - code [ref=e197]: "{ email, ch_id, signature_b64 }"
            - text: to
            - code [ref=e198]: /api/v1/tm/auth/verify
            - text: .
          - listitem [ref=e199]:
            - text: The server fetches your stored public key, runs
            - code [ref=e200]: ml_dsa65.verify
            - text: ", and on success returns a session token signed by its own ML-DSA-65 keypair."
          - listitem [ref=e201]:
            - text: The token lives in
            - code [ref=e202]: sessionStorage
            - text: for thirty minutes. Privileged actions still need a fresh per-action signature on top of the bearer.
        - heading "Register flow Skip" [level=3] [ref=e203]:
          - text: Register flow
          - link "Skip" [ref=e204] [cursor=pointer]:
            - /url: "#tm-dashboard"
        - list [ref=e205]:
          - listitem [ref=e206]:
            - text: An admin one tier above you mints an invite. You receive an invite link with an opaque
            - code [ref=e207]: invite_id
            - text: .
          - listitem [ref=e208]: You open the link, type your name, and choose a passphrase. The browser generates a fresh ML-DSA-65 keypair locally.
          - listitem [ref=e209]: The private key is encrypted with Argon2id + AES-256-GCM and written to IndexedDB.
          - listitem [ref=e210]:
            - text: The browser sends
            - code [ref=e211]: "{ invite_id, name, pubkey_b64 }"
            - text: to
            - code [ref=e212]: /api/v1/tm/auth/register
            - text: .
          - listitem [ref=e213]: The server checks the invite signature, marks it used in a Firestore transaction, writes your user record, and returns your fresh session token.
        - generic [ref=e214]: Lose the passphrase, lose the seat. The server never sees your passphrase or your private key. Recovery is by re-invitation from your parent in the hierarchy.
        - heading "Dashboard Skip" [level=3] [ref=e215]:
          - text: Dashboard
          - link "Skip" [ref=e216] [cursor=pointer]:
            - /url: "#tm-projects"
        - paragraph [ref=e217]: "Tile counts at the top, scoped to your subtree:"
        - list [ref=e218]:
          - listitem [ref=e219]: Open, In progress, Blocked, Done, Overdue, Cancelled.
          - listitem [ref=e220]: "Priority breakdown: low, medium, high, critical."
          - listitem [ref=e221]: Top assignees, ranked by open task count.
          - listitem [ref=e222]: Projects active.
        - paragraph [ref=e223]:
          - text: Backed by
          - code [ref=e224]: GET /api/v1/tm/dashboard
          - text: . Counts are filtered by your
          - code [ref=e225]: scope_path
          - text: ", so an SDMA officer in Himachal Pradesh sees Himachal numbers only."
        - heading "Projects Skip" [level=3] [ref=e226]:
          - text: Projects
          - link "Skip" [ref=e227] [cursor=pointer]:
            - /url: "#tm-tasks"
        - list [ref=e228]:
          - listitem [ref=e229]:
            - text: List. Scope-filtered.
            - code [ref=e230]: "?include_archived=true"
            - text: to see archived ones.
          - listitem [ref=e231]: Create. Name, description, owner, scope. The scope must sit inside your own.
          - listitem [ref=e232]: Drill-down. Click a project to see its tasks, assignees, and progress.
          - listitem [ref=e233]: Archive. Requires a fresh ML-DSA signature. The browser pops the passphrase dialog. Archive is reversible only by editing the document directly.
        - heading "Tasks Skip" [level=3] [ref=e234]:
          - text: Tasks
          - link "Skip" [ref=e235] [cursor=pointer]:
            - /url: "#tm-users"
        - list [ref=e236]:
          - listitem [ref=e237]: Create. Project, title, assignee, priority, due date.
          - listitem [ref=e238]:
            - text: Assign. Reassignment requires a fresh signature on the canonical message
            - code [ref=e239]: task.assign|<tid>|<assignee_uid>
            - text: .
          - listitem [ref=e240]: "Status transitions: open, in progress, blocked, done, cancelled. The server validates legal transitions."
          - listitem [ref=e241]: "Priority: low, medium, high, critical."
          - listitem [ref=e242]: Due dates. The dashboard counts a task as overdue when due date is past and status is not done or cancelled.
          - listitem [ref=e243]: "Volunteer rule: status-only updates on tasks they are assigned to. Anything else returns 403."
          - listitem [ref=e244]: "Responder rule: full edits on tasks they are assigned to."
          - listitem [ref=e245]:
            - text: "District and above: edit any task whose"
            - code [ref=e246]: scope_path
            - text: sits inside their own.
        - heading "Users Skip" [level=3] [ref=e247]:
          - text: Users
          - link "Skip" [ref=e248] [cursor=pointer]:
            - /url: "#tm-logout"
        - list [ref=e249]:
          - listitem [ref=e250]: Hierarchy table, sorted by tier and email. Each row shows tier, scope, parent, and active state.
          - listitem [ref=e251]: Two-click delegation. Click a user, click a new tier. The dialog reads back the change in plain language. Submit triggers the passphrase prompt for a fresh signature.
          - listitem [ref=e252]:
            - text: "The server validates: the new tier is at or below the caller's tier, the target's"
            - code [ref=e253]: scope_path
            - text: sits inside the caller's, the target is currently below the caller. Rejected delegations write a warning to the audit log too.
          - listitem [ref=e254]: Suspend. Disables a user without deleting them. They can be reactivated by the same parent.
          - listitem [ref=e255]:
            - text: Every mutation appends to
            - code [ref=e256]: tm_audit
            - text: with the canonical message and the signature, so post-incident review can replay who did what.
        - heading "Logout" [level=3] [ref=e257]
        - paragraph [ref=e258]:
          - text: Clicking Log out clears the session token from
          - code [ref=e259]: sessionStorage
          - text: . The encrypted private key stays in IndexedDB so the next login on the same device only needs the passphrase. To wipe the device, clear site data from the browser settings.
        - link "Skip to next section" [ref=e260] [cursor=pointer]:
          - /url: "#scopes"
