<!doctype html>
<html lang=en><head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name=theme-color content="#000000">
<meta name=color-scheme content=dark>
<meta name=robots content="noindex,nofollow">
<title>Aether Task Manager</title>
<link rel=icon href=/favicon.svg type=image/svg+xml>
<link rel=stylesheet href=tm.css>
</head>
<body data-route=loading>
<a href=#main class=skip>Skip to content</a>
<header role=banner>
 <a href="#/" class=logo aria-label="Aether Task Manager home">Aether<span> TM</span></a>
 <nav id=nav aria-label="Primary">
  <a href="#/" data-r=dash>Dashboard</a>
  <a href="#/projects" data-r=projects>Projects</a>
  <a href="#/tasks" data-r=tasks>Tasks</a>
  <a href="#/users" data-r=users>Users</a>
  <button id=btnLogout type=button>Log out</button>
 </nav>
</header>
<main id=main role=main aria-live=polite aria-busy=true>
 <p class=muted>Loading.</p>
</main>
<dialog id=dlgSign aria-labelledby=dlgSignTitle>
 <form id=fSign>
  <h2 id=dlgSignTitle>Confirm with your passphrase</h2>
  <p id=dlgSignDesc class=muted>This action requires a fresh signature.</p>
  <label for=dlgPass>Passphrase
   <input type=password id=dlgPass autocomplete=current-password required>
  </label>
  <p id=dlgErr role=alert class=err></p>
  <div class=row>
   <button type=button id=dlgCancel>Cancel</button>
   <button type=submit id=dlgOk>Sign and submit</button>
  </div>
 </form>
</dialog>
<script type=module src=tm.js></script>
</body></html>
