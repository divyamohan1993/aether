 }
 if(count>0)for(let i=0;i<numCoeffs;i++)out[i]/=count;
 return {vector:out,validFrames:count};
}
async function fmTrainStart(){
 if(fmTrainBusy||fmActive||rs)return;
 fmTrainBusy=true;
 TRSTART.disabled=true;TRAGAIN.disabled=true;
 TRPROMPT.hidden=false;
 let stream=null;
 try{
  stream=await N.mediaDevices.getUserMedia({audio:{channelCount:1,sampleRate:16000,noiseSuppression:false}});
  const vadMod=await import('/vad.js');
  const takes=[];
  for(let i=0;i<TRAIN_PROMPT_KEYS.length;i++){
   TRSTEP.textContent=(T.tr_step||'Step')+' '+(i+1)+' '+(T.tr_of||'of')+' '+TRAIN_PROMPT_KEYS.length;
   TRTEXT.textContent=T[TRAIN_PROMPT_KEYS[i]];
   live(T.tr_listen||'Listening — speak now.');
   TRPROG.style.width='0%';
   const take=await captureTake(stream,TRAIN_TAKE_MS,left=>{
    const pct=Math.min(100,Math.max(0,((TRAIN_TAKE_MS-left)/TRAIN_TAKE_MS)*100));
    TRPROG.style.width=pct.toFixed(0)+'%';
   });
   const m=takeMeanMfcc(vadMod,take);
   if(m.validFrames>0)takes.push(m.vector);
  }
  if(takes.length===0){live(T.tr_silence||'No speech heard.');return}
  const avg=vadMod.averageTemplates(takes);
  const tpl={template:Array.from(avg),samples_count:takes.length,enrolled_at:new Date().toISOString(),sample_rate:takes[0].sampleRate||16000};
  await _voicePut(tpl);
  fmTemplate=tpl;
  live(T.tr_saved||'Voice trained.');
 }catch(e){
  live((T.tr_fail||'Voice training failed.')+' '+(e.message||e));
 }finally{
  if(stream)try{stream.getTracks().forEach(t=>t.stop())}catch{}
  fmTrainBusy=false;
  TRSTART.disabled=false;TRAGAIN.disabled=false;
  TRPROMPT.hidden=true;TRPROG.style.width='0%';
  updateTrainCard();updateFmButton();
 }
}

// Slow-2g text-only fallback: post a tiny anon heartbeat every 60 s instead
// of audio uploads. Uses /api/v1/sos/anon (the unauthenticated survivor
// channel). Body shape mirrors sos-shell.html so the server treats it the
// same. Best-effort: if the request fails we skip; the next tick retries.
async function postAnonBeat(){
 fmTextBeatSeq++;
 const body={fp:'survivor-pending',seq:fmTextBeatSeq,ts:Math.floor(Date.now()/1000),codes:['need_help'],geo:geo?[parseFloat(geo.split(',')[0]),parseFloat(geo.split(',')[1]),Math.round(geoAcc||0)]:null,bat:null,sig:(N.connection&&N.connection.effectiveType)||'unknown',tap:0,motion:0};
 try{await fetch('/api/v1/sos/anon',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),keepalive:true})}catch{}
}
function fmEnterTextOnly(){
 fmTextOnly=true;
 try{if(fmRec&&fmRec.state!=='inactive')fmRec.stop()}catch{}
 try{if(fmVad)fmVad.stop()}catch{}fmVad=null;
 if(!fmTextBeatTimer){postAnonBeat();fmTextBeatTimer=setInterval(postAnonBeat,60000)}
 updateRibbon();
 live(T.auto_slow||'Audio paused. Text panic only.');
}

async function fmStart(){
 if(fmActive||rs)return;
 try{
  const vadMod=await import('/vad.js');
  const bitrate=vadMod.pickAudioBitrate(N);
  const maxClipMs=vadMod.pickMaxClipMs(N);
  fmSessionId=(crypto.randomUUID?crypto.randomUUID():(Date.now()+'-'+Math.random().toString(36).slice(2,10)));
  fmStartedAt=Date.now();fmActive=true;fmTextOnly=false;fmTextBeatSeq=0;
  fmAutoOffTimer=setTimeout(()=>fmStop('timeout'),FM_AUTO_OFF_MS);
  if(N.getBattery){try{fmBatteryRef=await N.getBattery();fmBatteryRef.addEventListener('levelchange',fmBatteryWatch);fmBatteryWatch()}catch{}}
  updateFmButton();
  if(bitrate===0){fmEnterTextOnly();return}
  fmStream=await N.mediaDevices.getUserMedia({audio:{channelCount:1,sampleRate:16000,noiseSuppression:false}});
  const gateActive=!!fmTemplate&&!VM.checked;
  fmVad=new vadMod.EnergyZcrVad();
  fmVad.addEventListener('phrase-start',()=>{
   if(fmRecActive||fmTextOnly)return;
   try{
    const m=['audio/webm;codecs=opus','audio/ogg;codecs=opus'].find(t=>MediaRecorder.isTypeSupported(t))||'';
    fmRec=new MediaRecorder(fmStream,m?{mimeType:m,audioBitsPerSecond:bitrate}:{audioBitsPerSecond:bitrate});
    fmRecChunks=[];
    fmRec.ondataavailable=e=>e.data.size&&fmRecChunks.push(e.data);
    fmRec.onstop=async()=>{
     fmRecActive=false;
     const b=new Blob(fmRecChunks,{type:fmRec.mimeType||'audio/webm'});
     fmRecChunks=[];
     if(b.size<=500)return;
     if(gateActive&&fmVad&&fmVad.phraseBuffer&&fmVad.phraseBuffer.length>0){
      try{
       const sm=new vadMod.SpeakerMfcc();
       const score=sm.match(fmTemplate,fmVad.phraseBuffer,fmTemplate.sample_rate||16000);
       if(score<FM_VOICE_MATCH_FLOOR)return;
      }catch{}
     }
     let bt=null;if(N.getBattery){try{const x=await N.getBattery();bt=Math.round(x.level*100)}catch{}}
     const c=N.connection,now=new Date().toISOString();
     const _fmM=snapshotMotion();
     await enq({capturedAt:now,status:'pending',blob:b,mime:b.type||'audio/webm',ts:now,geo,geoAcc,geoSrc,
      altitude:geoAlt,altitudeAccuracy:geoAltAcc,heading:geoHeading,speed:geoSpeed,
      pressure:envPressure,pressureBaseline:envPressureBaseline,
      motionPeak:_fmM.peak,motionRms:_fmM.rms,btPeers:btPeers,
      bat:bt,lang:N.language||'en-IN',net:c&&c.effectiveType||'',field_mode_session_id:fmSessionId,lastError:''});
     live(T.auto_phrase||'Phrase captured.');
    };
    fmRec.start();fmRecActive=true;
    fmRecTimer=setTimeout(()=>{try{fmRec.state!=='inactive'&&fmRec.stop()}catch{}},maxClipMs);
   }catch{fmRecActive=false}
  });
  fmVad.addEventListener('phrase-end',()=>{
   if(!fmRecActive)return;
   if(fmRecTimer){clearTimeout(fmRecTimer);fmRecTimer=null}
   try{fmRec.state!=='inactive'&&fmRec.stop()}catch{}
  });
  await fmVad.start(fmStream);
  if(!gateActive&&!fmTemplate)live(T.fm_no_voice||'Voice gate unavailable; sending all phrases.');
  updateRibbon();
  live(T.auto_msg_on||T.fm_on_msg);
  // Refresh the ribbon countdown every 30 s.
  const tick=()=>{if(fmActive){updateRibbon();setTimeout(tick,30000)}};setTimeout(tick,30000);
 }catch(e){fmStop('error');live((T.fx||'Failed.')+' '+(e.message||e))}
}
A(FM,'click',()=>{if(FM.disabled)return;if(fmActive)fmStop('user');else fmStart()});
A(RB,'click',()=>fmStop('user'));
A(TRSTART,'click',()=>fmTrainStart());
A(TRAGAIN,'click',()=>fmTrainStart());

// Permissions check. Surfaces mic/geo/notification permission state so users
// can debug "why didn't it record". permissions.query() unsupported on Safari
// for some names — render "unknown" in that case.
async function showPerms(){
 const out=[];
 const q=async name=>{try{const r=await N.permissions.query({name});return r&&r.state||'unknown'}catch{return 'unknown'}};
 const map={granted:T.perms_granted,denied:T.perms_denied,prompt:T.perms_prompt,unknown:T.perms_unknown};
 const mic=N.permissions?await q('microphone'):'unknown';
 const gp=N.permissions?await q('geolocation'):'unknown';
 const nt=(self.Notification&&Notification.permission)||(N.permissions?await q('notifications'):'unknown');
 out.push(T.perms_mic+': '+(map[mic]||mic));
 out.push(T.perms_geo+': '+(map[gp]||gp));
 out.push(T.perms_notif+': '+(map[nt]||nt));
 PERMSOUT.textContent=out.join(' · ');
 PERMSOUT.hidden=false;
}
A(PERMSBTN,'click',showPerms);

await renderQ();await renderT();
if(N.onLine){flush();startPoll()}
pushSubscribe();

// Saved-locale restore. Runs after renderQ/renderT exist so the
// dynamic re-render in setLocale finds them.
(async()=>{
 const saved=await _prefGet('locale');
 const navLg=(N.language||'en').slice(0,2);
 const pick=saved&&LCODES.includes(saved)?saved:(LCODES.includes(navLg)?navLg:'en');
 if(pick!=='en')await setLocale(pick);else applyLocaleDynamic();
})();
})();
