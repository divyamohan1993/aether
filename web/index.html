let pollTm=null;
const startPoll=()=>{if(pollTm)return;pollAll();pollTm=setInterval(pollAll,15000)};
const stopPoll=()=>{if(pollTm){clearInterval(pollTm);pollTm=null}};
const setRes=j=>{
  const tr=j.triage||{},u=tr.urgency||'UNCLEAR';
  const sm=String(tr.summary_for_dispatch||T.h);
  P.replaceChildren();P.className='res u-'+u;
  const tg=CE('span');tg.className='tag';tg.textContent=u;
  P.append(tg,sm);
  const meta=[];
  if(j.caller&&(j.caller.name||j.caller.email))meta.push(j.caller.name||j.caller.email);
  if(j.location)meta.push(j.location.lat.toFixed(4)+','+j.location.lng.toFixed(4));
  if(j.received_at)meta.push(fmtT(Date.parse(j.received_at)));
  if(meta.length){const m=CE('span');m.className='meta';m.textContent=meta.join(' · ');P.append(m)}
};
const send=async r=>{
  const s=SS();if(!s){location.replace('/tm/#/login?next=%2F');throw new Error('no session')}
  const h={'Content-Type':r.mime,'X-Client-Id':cid,'X-Client-Lang':r.lang||(N.language||'en-IN'),'X-Client-Timestamp':r.ts,'Authorization':'Bearer '+s.token};
  if(r.geo){h['X-Client-Geo']=r.geo;if(r.geoAcc!=null)h['X-Client-Geo-Accuracy']=String(Math.round(r.geoAcc));if(r.geoSrc)h['X-Client-Geo-Source']=r.geoSrc}
  if(r.bat!=null)h['X-Client-Battery']=String(r.bat);
  if(r.net)h['X-Client-Network']=r.net;
  const x=await fetch('/api/v1/triage',{method:'POST',headers:h,body:r.blob});
  if(x.status===401){sessionStorage.removeItem('aether-tm-session');location.replace('/tm/#/login?next=%2F');throw new Error('auth')}
  if(!x.ok)throw new Error('HTTP '+x.status);
  return x.json();
};
let busy=false;
const flush=async()=>{
  if(busy||!N.onLine)return;
  busy=true;SN.disabled=true;
  try{
    while(N.onLine){
      const items=await qAll();
      const it=items.find(i=>i.status==='pending'||i.status==='failed');
      if(!it)break;
      it.status='sending';it.lastError='';await qPut(it);await renderQ();
      try{
        const j=await send(it);
        await qDel(it.id);
        await trackAdd(j);
        setRes(j);live(T.sx+' '+fmtT(Date.now()));
        await renderQ();startPoll();
      }catch(e){
        const cur=await qGet(it.id);
        const em=String(e.message||e);
        if(cur){cur.status='failed';cur.lastError=em;await qPut(cur)}
        live(T.fx+' '+em);
        break;
      }
    }
  }finally{busy=false;await renderQ()}
};
const retry=async i=>{const it=await qGet(i);if(!it||it.status==='sending')return;it.status='pending';it.lastError='';await qPut(it);await renderQ();flush()};
const enq=async r=>{await qPut(r);await renderQ();live(T.ax);if('serviceWorker' in N&&'SyncManager' in self){try{const w=await N.serviceWorker.ready;await w.sync.register('flush')}catch(e){}}flush()};
A(SN,'click',()=>flush());
let rs=0,mr,st,ch=[],tm,pt=0,tp=false;
const start=async()=>{if(rs)return;
  try{
    st=await N.mediaDevices.getUserMedia({audio:{channelCount:1,sampleRate:16000,noiseSuppression:false}});
    const m=['audio/webm;codecs=opus','audio/ogg;codecs=opus'].find(t=>MediaRecorder.isTypeSupported(t))||'';
    mr=new MediaRecorder(st,m?{mimeType:m,audioBitsPerSecond:12000}:{audioBitsPerSecond:12000});
    ch=[];
    mr.ondataavailable=e=>e.data.size&&ch.push(e.data);
    mr.onstop=async()=>{
      st.getTracks().forEach(x=>x.stop());
      const b=new Blob(ch,{type:mr.mimeType||'audio/webm'});
      rs=0;S.dataset.r='0';S.setAttribute('aria-pressed','false');S.textContent=T.b;
      if(b.size<=500)return;
      let bt=null;if(N.getBattery){try{const x=await N.getBattery();bt=Math.round(x.level*100)}catch(e){}}
      const c=N.connection,now=new Date().toISOString();
      await enq({capturedAt:now,status:'pending',blob:b,mime:b.type||'audio/webm',ts:now,geo,geoAcc,geoSrc,bat:bt,lang:N.language||'en-IN',net:c&&c.effectiveType||'',lastError:''});
    };
    mr.start();rs=1;S.dataset.r='1';S.setAttribute('aria-pressed','true');S.textContent=T.r;
    tm=setTimeout(stop,30000);
  }catch(e){live(T.fx+' '+(e.message||e))}
};
const stop=()=>{if(!rs)return;clearTimeout(tm);try{mr.state!=='inactive'&&mr.stop()}catch(e){}};
const dn=e=>{e.preventDefault();if(!rs){start();pt=Date.now();tp=false}else if(tp)stop()};
const upE=e=>{e.preventDefault();if(rs){if(Date.now()-pt>250)stop();else tp=true}};
A(S,'pointerdown',dn);A(S,'pointerup',upE);A(S,'pointercancel',()=>{if(rs&&!tp)stop()});
const kc=e=>e.key===' '||e.key==='Enter';
A(S,'keydown',e=>{if(kc(e)&&!e.repeat){e.preventDefault();dn(e)}});
A(S,'keyup',e=>{if(kc(e)){e.preventDefault();upE(e)}});
A(S,'contextmenu',e=>e.preventDefault());
A(self,'online',()=>{net();flush()});A(self,'offline',net);
if(N.connection)A(N.connection,'change',net);
A(D,'visibilitychange',()=>{if(D.visibilityState==='visible'&&N.onLine){flush();startPoll()}else stopPoll()});
if('serviceWorker' in N){
  A(self,'load',()=>N.serviceWorker.register('sw.js').catch(()=>{}));
  A(N.serviceWorker,'message',e=>{if(e.data&&e.data.k==='flush')flush()});
}
(async()=>{await renderQ();await renderT();if(N.onLine){flush();startPoll()}})();
})();
</script></body></html>
